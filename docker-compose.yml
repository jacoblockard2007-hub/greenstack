version: "3.9"

services:
  greenstack:
    build: .
    container_name: greenstack
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - greenstack_data:/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  greenstack_data:
    driver: local
    # SQLite DB is stored at /data/greenstack.db inside the container.
    # Data persists across container restarts and rebuilds.
